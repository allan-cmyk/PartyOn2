<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #ffffff;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
}
.header {
  background: #1E3A5F;
  padding: 30pt 50pt;
  text-align: center;
}
h1 {
  font-size: 36pt;
  margin: 0;
  color: white;
  font-weight: bold;
}
.price {
  font-size: 48pt;
  color: #F59E0B;
  margin: 10pt 0 0 0;
  font-weight: bold;
}
.content {
  padding: 35pt 50pt;
  flex: 1;
  display: flex;
  gap: 30pt;
}
.column {
  flex: 1;
}
h2 {
  font-size: 20pt;
  color: #0B7285;
  margin: 0 0 15pt 0;
  font-weight: bold;
}
ul {
  font-size: 15pt;
  line-height: 1.7;
  margin: 0;
  padding-left: 20pt;
}
.note {
  background: #FFF5E6;
  padding: 15pt;
  margin: 20pt 50pt;
  border-left: 5pt solid #F59E0B;
  font-size: 13pt;
  color: #2D3748;
}
</style>
</head>
<body>
<div class="header">
  <h1>THE PACKAGE</h1>
  <p class="price">$636.71</p>
</div>
<div class="content">
  <div class="column">
    <h2>Spirits</h2>
    <ul>
      <li>2x Casamigos Tequila</li>
      <li>1x Grey Goose Vodka</li>
      <li>1x Crown Royal Purple</li>
    </ul>
    <h2 style="margin-top: 20pt;">Energy</h2>
    <ul>
      <li>2x Red Bull Cases</li>
    </ul>
  </div>
  <div class="column">
    <h2>Refreshments</h2>
    <ul>
      <li>24x White Claw Variety</li>
    </ul>
    <h2 style="margin-top: 20pt;">Recovery</h2>
    <ul>
      <li>1x Liquid IV Pack</li>
    </ul>
  </div>
</div>
<div class="note">
  <p style="margin: 0; font-weight: bold;">Note: Final selections can be customized based on preferences</p>
</div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background-image: url('gradient-bg.png');
  background-size: cover;
  font-family: Arial, sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
}
.content {
  text-align: center;
  background: white;
  padding: 50pt;
  border-radius: 12pt;
  box-shadow: 5px 5px 20px rgba(0, 0, 0, 0.3);
  margin: 50pt;
}
h1 {
  font-size: 36pt;
  margin: 0 0 30pt 0;
  color: #1E3A5F;
  font-weight: bold;
}
.total {
  font-size: 64pt;
  color: #0B7285;
  margin: 0 0 20pt 0;
  font-weight: bold;
}
.breakdown {
  font-size: 18pt;
  color: #2D3748;
  margin: 20pt 0;
  line-height: 1.8;
}
.perhead {
  font-size: 24pt;
  color: #FF6B6B;
  margin: 25pt 0 0 0;
  font-weight: bold;
}
.note {
  font-size: 14pt;
  color: #718096;
  margin: 15pt 0 0 0;
  font-style: italic;
}
</style>
</head>
<body>
<div class="content">
  <h1>THE INVESTMENT</h1>
  <p class="total">$636.71</p>
  <p class="breakdown">Total Package Cost</p>
  <p class="perhead">~$64 per person (10 attendees)</p>
  <p class="note">Split cost makes premium experience affordable</p>
</div>
</body>
</html>

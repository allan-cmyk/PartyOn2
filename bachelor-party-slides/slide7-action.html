<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #1E3A5F;
  font-family: Arial, sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
}
.content {
  text-align: center;
  color: white;
  margin: 50pt;
}
h1 {
  font-size: 48pt;
  margin: 0 0 30pt 0;
  font-weight: bold;
  color: #F59E0B;
}
.cta-box {
  background: #0B7285;
  padding: 35pt;
  border-radius: 12pt;
  margin: 30pt 0;
  border: 3pt solid #FF6B6B;
}
h2 {
  font-size: 28pt;
  margin: 0 0 20pt 0;
  color: white;
  font-weight: bold;
}
.details {
  font-size: 18pt;
  line-height: 1.8;
  margin: 0;
}
.website {
  font-size: 32pt;
  margin: 35pt 0 0 0;
  font-weight: bold;
  color: #F59E0B;
}
.footer {
  font-size: 16pt;
  margin: 25pt 0 0 0;
  color: #CBD5E0;
}
</style>
</head>
<body>
<div class="content">
  <h1>LET'S DO THIS</h1>
  <div class="cta-box">
    <h2>Ready to Commit?</h2>
    <p class="details">Visit our website to customize your package and lock in your delivery date</p>
  </div>
  <p class="website">PartyOnDelivery.com</p>
  <p class="footer">Contact the organizer to confirm attendance</p>
</div>
</body>
</html>

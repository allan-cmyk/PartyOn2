<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Party On text curved at top -->
  <path id="topCurve" d="M 50 80 Q 150 40 250 80" stroke="none" fill="none"/>
  <text font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#2E7D9A">
    <textPath href="#topCurve" startOffset="10%">Party On</textPath>
  </text>
  
  <!-- Central location pin with wine glass -->
  <g transform="translate(150, 150)">
    <!-- Pin body -->
    <path d="M0 -50 C-25 -50 -45 -30 -45 -5 C-45 20 0 50 0 50 C0 50 45 20 45 -5 C45 -30 25 -50 0 -50 Z" 
          fill="#F4C430" stroke="#4A5568" stroke-width="3"/>
    
    <!-- Wine glass inside pin -->
    <g transform="translate(0, -15)">
      <!-- Glass bowl -->
      <path d="M-12 -8 L-12 2 Q-12 8 -6 8 L6 8 Q12 8 12 2 L12 -8 Z" 
            fill="white" stroke="#4A5568" stroke-width="2"/>
      <!-- Glass stem -->
      <line x1="0" y1="8" x2="0" y2="18" stroke="#4A5568" stroke-width="2"/>
      <!-- Glass base -->
      <line x1="-8" y1="18" x2="8" y2="18" stroke="#4A5568" stroke-width="2"/>
      <!-- Wine/liquid -->
      <path d="M-10 -6 L-10 0 Q-10 6 -6 6 L6 6 Q10 6 10 0 L10 -6 Z" 
            fill="#8B0000" opacity="0.7"/>
    </g>
    
    <!-- Star accent on pin -->
    <path d="M0 -35 L2 -25 L8 -25 L4 -20 L6 -15 L0 -18 L-6 -15 L-4 -20 L-8 -25 L-2 -25 Z" 
          fill="#2E7D9A"/>
  </g>
  
  <!-- Delivery text curved at bottom -->
  <path id="bottomCurve" d="M 50 220 Q 150 260 250 220" stroke="none" fill="none"/>
  <text font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#2E7D9A">
    <textPath href="#bottomCurve" startOffset="18%">DELIVERY</textPath>
  </text>
  
  <!-- Decorative curved lines -->
  <path d="M 30 50 Q 50 30 70 50" stroke="#2E7D9A" stroke-width="3" fill="none"/>
  <path d="M 230 50 Q 250 30 270 50" stroke="#2E7D9A" stroke-width="3" fill="none"/>
  <path d="M 30 250 Q 50 270 70 250" stroke="#2E7D9A" stroke-width="3" fill="none"/>
  <path d="M 230 250 Q 250 270 270 250" stroke="#2E7D9A" stroke-width="3" fill="none"/>
</svg>